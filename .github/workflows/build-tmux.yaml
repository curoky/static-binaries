name: build tmux
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-tmux.yaml'
      - 'Formula/tmux.rb'
      - 'src/action/install.yaml'
  release:
    types: [created]

jobs:
  install:
    strategy:
      fail-fast: false
      matrix:
        version:
          - '3.2a'
          - '2.9a'

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: install binary
        uses: ./action/install
        with:
          formula: tmux
          env: 'HOMEBREW_TMUX_VERSION=${{ matrix.version }}'

      - name: check binary
        run: ls -lah bin

      - name: upload artifacts
        uses: actions/upload-artifact@v2
        with:
          name: binaries-${{ matrix.version }}
          path: bin
          retention-days: 1

  upload-release:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v2
      - uses: actions/download-artifact@v2
        with:
          name: binaries-3.2a
          path: bin/3.2a

      - uses: actions/download-artifact@v2
        with:
          name: binaries-2.9a
          path: bin/2.9a

      - name: list files
        run: ls -lahR bin

      - name: prepare files
        run: ./pack.py bin dist tmux

      - name: upload binaries to release
        if: github.event_name == 'release' && github.event.action == 'created'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/*
          overwrite: true
          file_glob: true
          tag: ${{ github.ref }}
          prerelease: true
