name: build sb

# Builds the sb client itself (client/, Go) and publishes it to the same
# ghcr registry as the packages, so it can be bootstrapped with a single curl
# and later self-upgraded like any other package.

on:
  push:
    paths:
      - '.github/workflows/build-sb.yaml'
      - 'client/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64, tag: linux-x86_64 }
          - { goos: darwin, goarch: arm64, tag: darwin-arm64 }
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: client/go.sum

      # Statically-linked binary with no host runtime dependencies (CGO off).
      - working-directory: client
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go vet ./...
          go test ./...
          mkdir -p ./sb
          go build -trimpath -ldflags="-s -w" -o ./sb/sb .
          tar -czvf ./sb.${{ matrix.tag }}.tar.gz ./sb

      - uses: oras-project/setup-oras@v1

      - run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin

      - working-directory: client
        run: >
          oras push ghcr.io/curoky/standalone-binaries:sb-${{ matrix.tag }}
          ./sb.${{ matrix.tag }}.tar.gz:application/vnd.oci.image.layer.v1.tar+gzip
