name: build fbthriftc
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-fbthriftc.yaml'
      - 'Formula/fbthriftc.rb'
      - 'action/install/action.yaml'

jobs:
  install:
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        version:
          - '2019.06.03'
          - '2019.12.30'
          - '2020.12.14'
          - '2021.03.01'
          - '2021.06.07'

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: install binary
        uses: ./action/install
        with:
          formula: fbthriftc
          env: 'HOMEBREW_FBTHRIFTC_VERSION=${{ matrix.version }}'

      - name: check binary
        run: ls -lah /home/linuxbrew/.linuxbrew/opt/fbthriftc/bin/thrift1
