name: build fbthriftc
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-fbthriftc.yaml'
      - 'Formula/fbthriftc.rb'
      - 'action/install/action.yaml'
  release:
    types: [created]

jobs:
  install:
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        version:
          - '2020.12.14'
          - '2021.06.07'

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: install binary
        uses: ./action/install
        with:
          formula: fbthriftc
          env: 'HOMEBREW_FBTHRIFTC_VERSION=${{ matrix.version }}'

      - name: check binary
        run: ls -lah bin

      - name: upload artifacts
        uses: actions/upload-artifact@v2
        with:
          name: ${{ matrix.version }}-binaries
          path: bin
          retention-days: 1

      - name: upload artifacts
        uses: actions/upload-artifact@v2
        with:
          name: binaries-${{ matrix.version }}
          path: bin
          retention-days: 1

  upload-release:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/download-artifact@v2
        with:
          name: binaries-2020.12.14
          path: bin/2020.12.14

      - uses: actions/download-artifact@v2
        with:
          name: binaries-2021.06.07
          path: bin/2021.06.07

      - name: list files
        run: ls -lahR bin

      - name: prepare files
        run: ./pack.py bin dist thrift1:fbthrifc

      - name: upload binaries to release
        if: github.event_name == 'release' && github.event.action == 'created'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/*
          overwrite: true
          file_glob: true
          tag: ${{ github.ref }}
          prerelease: true
