name: build linux

on:
  push:
    branches:
      - master
  # push:
  #   paths:
  #     - ".github/workflows/build.yaml"
  #     - "pkgs/**"
  #     - "tasks/**"
  #     - "scripts/**"
  workflow_dispatch:
    inputs:
      name:
        description: 'package name'
        default: ''
        required: false
        type: string
  schedule:
    - cron: '0 0 * * 0'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      # max-parallel: 10
      matrix:
        # task --list-all | sed -e 's/://g' -e 's/*/- name:/g'
        include:
          - name: aria2
          - name: atuin
          - name: autoconf
          - name: automake
          - name: bash
          - name: bat
          - name: bazelisk
          - name: binutils
          # - name: biome
          - name: bison
          - name: buildifier
          - name: bzip2
          - name: cacert
          - name: cloc
          - name: cmake
          - name: connect
          - name: coreutils
          - name: croc
          - name: cronie
          - name: curl
          - name: diffutils
          - name: dive
          - name: dool
          - name: dprint
          - name: ethtool
          - name: exiftool
          - name: eza
          - name: fd
          - name: file
          - name: findutils
          - name: flac
          - name: flex
          - name: fzf
          - name: gawk
          - name: gdb
          - name: gdu
          - name: getopt
          - name: gettext
          - name: gh
          - name: git
          - name: git-absorb
          - name: git-extras
          - name: git-filter-repo
          - name: git-lfs
          - name: glibcLocales
          - name: gnugrep
          - name: gnumake
          - name: gnupatch
          - name: gnupg
          - name: gnused
          - name: gnutar
          - name: go-task
          - name: gost
          - name: gzip
          - name: indent
          - name: inetutils
          - name: iproute2
          - name: iptables
          - name: iputils
          - name: jq
          - name: krb5
          - name: lefthook
          - name: less
          - name: libcap
          - name: libtool
          - name: lsb-release
          - name: lsof
          - name: lua
          - name: m4
          - name: makeself
          # - name: man
          - name: mcfly
          - name: miniserve
          - name: music-decrypto
          - name: ncdu_1
          - name: netcat
          - name: netron
          - name: nettools
          - name: ninja
          - name: nixfmt
          # - name: nsight-systems
          - name: numactl
          - name: openssh_gssapi
          - name: openssl
          - name: oras
          - name: p7zip
          - name: parallel
          - name: patchelf
          - name: perl
          - name: pkg-config
          - name: procps
          - name: procs
          - name: protobuf_23
          - name: protobuf_24
          - name: protobuf_25
          - name: protobuf_26
          - name: protobuf_27
          - name: protobuf_28
          - name: protobuf_29
          - name: protobuf_3_8_0
          - name: protobuf_3_9_2
          - name: protobuf3_20
          - name: protobuf3_21
          - name: python311
          - name: python312
          - name: python313
          - name: rime-plugs
          - name: ripgrep
          - name: rsync
          - name: ruff
          - name: scc
          - name: shellcheck
          - name: shfmt
          - name: snappy
          - name: sqlite
          - name: starship
          - name: strace
          - name: tmux
          - name: tmux-plugs
          - name: tree
          - name: tzdata
          - name: unzip
          - name: util-linux
          - name: uv
          - name: vim
          - name: vim-plugs
          - name: wget
          - name: xxd
          - name: xz
          - name: yazi
          - name: zellij
          - name: zip
          - name: zlib
          - name: zlib-ng
          - name: zsh
          - name: zsh-bundle
          - name: zsh-plugs
          - name: zstd

          - name: s6
          - name: s6-rc
          - name: s6-linux-init
          - name: s6-linux-utils
          - name: s6-portable-utils
          - name: s6-networking
          - name: s6-dns
          - name: skalibs
          - name: execline

          # - name: silver-searcher

    steps:
      - run: echo "skip_steps=true" >> $GITHUB_ENV
      - run: echo "skip_steps=false" >> $GITHUB_ENV
        if: ${{ (github.event_name == 'workflow_dispatch' && (inputs.name == matrix.name || inputs.name == '*')) || (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'schedule' }}

      - uses: actions/checkout@v5
        if: ${{ env.skip_steps != 'true' }}

      - run: sudo sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin v3.49.1
        if: ${{ env.skip_steps != 'true' }}

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            nix-path = nixpkgs=https://nixos.org/channels/nixos-25.11
        if: ${{ env.skip_steps != 'true' }}

      #       substituters = https://cache.nixos.org?priority=10 https://my-custom-cache.cachix.org?priority=20
      #       trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
      # - uses: DeterminateSystems/magic-nix-cache-action@main
      - uses: cachix/cachix-action@v15
        with:
          name: curoky-static-binaries
          authToken: 'eyJhbGciOiJIUzI1NiJ9.eyJqdGkiOiJiMWUxZDY1MC1jMDU3LTQ4NjctOTU3ZC1mMjczNTNlMDlmMWUiLCJzY29wZXMiOiJjYWNoZSJ9.aLeSNnHszgoJ1RX9Vo4RTE12GA51gBLeUMJ9keBJ8DE'
        if: ${{ env.skip_steps != 'true' }}

      - run: |
          task -t tasks/common/Taskfile.yaml setup
          task -t tasks/linux-x86_64/Taskfile.yaml ${{ matrix.name }}
          nix-store -qR $(readlink -f ~/nix/profiles/prebuilt) | cachix push curoky-static-binaries
          cp -RL ~/nix/profiles/prebuilt ./${{ matrix.name }}
          ./scripts/patch.sh ${{ matrix.name }} ./${{ matrix.name }}
          tar -czvf ./${{ matrix.name }}.linux-x86_64.tar.gz ./${{ matrix.name }}
        if: ${{ env.skip_steps != 'true' }}

      - uses: oras-project/setup-oras@v1
        if: ${{ env.skip_steps != 'true' }}

      # - uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}
      - run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin
        if: ${{ env.skip_steps != 'true' }}

      - run: >
          oras push ghcr.io/curoky/static-binaries-v2:${{ matrix.name }}-linux-x86_64
          ./${{ matrix.name }}.linux-x86_64.tar.gz:application/vnd.oci.image.layer.v1.tar+gzip
        if: ${{ env.skip_steps != 'true' }}

      # - uses: svenstaro/upload-release-action@v2
      #   if: ${{ env.skip_steps != 'true' }}
      #   with:
      #     file: ${{ matrix.name }}.linux-x86_64.tar.gz
      #     asset_name: ${{ matrix.name }}.linux-x86_64.tar.gz
      #     tag: 'v1.0'
      #     overwrite: true

      # - uses: mxschmitt/action-tmate@v3
      #   if: ${{ failure() }}
      #   timeout-minutes: 60
