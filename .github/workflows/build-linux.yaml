name: build linux

on:
  push:
    paths:
      - '.github/workflows/build-linux.yaml'
      - 'pkgs/**'
      - 'pkgs-list/**'
      - 'scripts/**'
      - 'flake*'
  workflow_dispatch:
    inputs:
      name:
        description: 'package name (use "*" to force build all)'
        default: ''
        required: false
        type: string
  schedule:
    - cron: '0 0 * * 0'

env:
  CACHIX_NAME: curoky-static-binaries-v2
  CACHIX_STORE: https://curoky-static-binaries-v2.cachix.org

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      count: ${{ steps.set.outputs.count }}
    steps:
      - uses: actions/checkout@v5

      - uses: DeterminateSystems/nix-installer-action@main

      - id: set
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_NAME: ${{ inputs.name }}
        run: |
          set -euo pipefail

          # All package names exposed by the flake, excluding the "all" aggregate.
          mapfile -t all_pkgs < <(
            nix eval --json .#packages.x86_64-linux --apply builtins.attrNames \
              | nix run nixpkgs#jq -- -r '.[] | select(. != "all")'
          )

          # Decide which packages to consider.
          # - workflow_dispatch with a specific name  -> only that package
          # - workflow_dispatch with "*", or schedule  -> force build all
          # - push                                     -> only packages missing from the binary cache
          force_all=false
          if [ "$EVENT_NAME" = "schedule" ]; then
            force_all=true
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$INPUT_NAME" = "*" ] || [ -z "$INPUT_NAME" ]; then
              force_all=true
            else
              all_pkgs=("$INPUT_NAME")
            fi
          fi

          selected=()
          for name in "${all_pkgs[@]}"; do
            if [ "$force_all" = true ]; then
              selected+=("$name")
              continue
            fi

            # Resolve the output path without building, then ask the binary cache
            # whether it already has it. A cache miss (path-info fails) means the
            # package must be rebuilt.
            out_path=$(nix eval --raw ".#packages.x86_64-linux.${name}.outPath")
            if nix path-info --store "$CACHIX_STORE" "$out_path" >/dev/null 2>&1; then
              echo "cache hit : $name"
            else
              echo "need build: $name"
              selected+=("$name")
            fi
          done

          # Build a matrix JSON: {"include":[{"name":"foo"},...]}
          matrix=$(printf '%s\n' "${selected[@]:-}" \
            | nix run nixpkgs#jq -- -R -s -c \
                'split("\n") | map(select(length > 0)) | {include: map({name: .})}')

          echo "count=${#selected[@]}" >> "$GITHUB_OUTPUT"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "selected packages (${#selected[@]}): ${selected[*]:-<none>}"

  build:
    needs: discover
    if: ${{ needs.discover.outputs.count != '0' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5

      - run: |
          sudo apt-get update -y
          sudo apt-get install -y rsync

      - uses: DeterminateSystems/nix-installer-action@main

      - run: nix config show substituters

      - uses: cachix/cachix-action@v15
        with:
          name: ${{ env.CACHIX_NAME }}
          authToken: ${{ secrets.CACHIX_TOKEN }}

      - run: |
          nix build .#${{ matrix.name }}
          nix-store -qR $(readlink -f ./result)
          nix-store -qR $(readlink -f ./result) | cachix push ${{ env.CACHIX_NAME }}
          rsync -av --copy-unsafe-links ./result/ ./${{ matrix.name }}/
          find ./${{ matrix.name }} -type d -exec chmod +w {} +
          tar -czvf ./${{ matrix.name }}.linux-x86_64.tar.gz ./${{ matrix.name }}

      - uses: oras-project/setup-oras@v1

      - run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin

      - run: >
          oras push ghcr.io/curoky/static-binaries-v3:${{ matrix.name }}-linux-x86_64
          ./${{ matrix.name }}.linux-x86_64.tar.gz:application/vnd.oci.image.layer.v1.tar+gzip
