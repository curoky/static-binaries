          # - name: exiftool
          - name: eza
          - name: fd
          - name: file
          - name: findutils
          - name: flac
          - name: flex
          - name: fzf
          - name: gawk
          - name: gdb
          - name: gdu
          - name: getopt
          - name: gettext
          - name: gh
          # - name: git
          - name: git-absorb
          - name: git-extras
          - name: git-filter-repo
          - name: git-lfs
          # - name: glibcLocales
          - name: gnugrep
          - name: gnumake
          - name: gnupatch
