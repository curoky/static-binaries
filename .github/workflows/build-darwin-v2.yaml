          - name: jq
          # - name: krb5
          - name: lefthook
          - name: less
          # - name: libcap
          - name: libtool
          # - name: lsb-release
          - name: lsof
          # - name: lua
          - name: m4
          - name: makeself
          # - name: man
          - name: mcfly
