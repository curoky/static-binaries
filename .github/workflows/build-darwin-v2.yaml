name: build darwin v2

on:
  # push:
  #   branches:
  #     - master
  #     - dev
  push:
    paths:
      - '.github/workflows/build-darwin-v2.yaml'
      - 'pkgs/**'
      - 'pkgs-list/**'
      - 'scripts/**'
      - 'flake*'
  workflow_dispatch:
    inputs:
      name:
        description: 'package name'
        default: ''
        required: false
        type: string
  schedule:
    - cron: '0 0 * * 0'

env:
  CACHED_PKG: '["aria2", "flex", "gdb", "uv", "yazi", "starship", "fd", "bison", "protobuf_27", "protobuf_28", "protobuf_29"]'

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write
      packages: write
    strategy:
      matrix:
