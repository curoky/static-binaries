name: build thriftc
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-thriftc.yaml'
      - 'Formula/thriftc.rb'
      - 'action/install/action.yaml'
  release:
    types: [created]

jobs:
  install:
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        version:
          - '0.8.0'
          - '0.9.0'
          - '0.9.1'
          - '0.9.2'
          - '0.9.3'
          - '0.9.3.1'
          - '0.10.0'
          - '0.11.0'
          - '0.12.0'
          - '0.13.0'
          - '0.14.2'
          - '0.15.0'

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: install binary
        uses: ./action/install
        with:
          formula: thriftc
          env: 'HOMEBREW_THRIFTC_VERSION=${{ matrix.version }}'

      - name: check binary
        run: ls -lah bin

      - name: upload artifacts
        uses: actions/upload-artifact@v2
        with:
          name: binaries-${{ matrix.version }}
          path: bin
          retention-days: 1

  upload-release:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/download-artifact@v2
        with:
          name: binaries-0.15.0
          path: bin/0.15.0

      - uses: actions/download-artifact@v2
        with:
          name: binaries-0.14.2
          path: bin/0.14.2

      - uses: actions/download-artifact@v2
        with:
          name: binaries-0.9.2
          path: bin/0.9.2

      - uses: actions/download-artifact@v2
        with:
          name: binaries-0.9.1
          path: bin/0.9.1

      - name: list files
        run: ls -lahR bin

      - name: prepare files
        run: |
          mkdir dist
          mv bin/0.9.1/thrift dist/thrift-0.9.1
          mv bin/0.9.2/thrift dist/thrift-0.9.2
          mv bin/0.14.2/thrift dist/thrift-0.14.2
          mv bin/0.15.0/thrift dist/thrift-0.15.0

      - name: upload binaries to release
        if: github.event_name == 'release' && github.event.action == 'created'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/*
          overwrite: true
          file_glob: true
          tag: ${{ github.ref }}
          prerelease: true
