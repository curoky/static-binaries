name: build thriftc
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-thriftc.yaml'
      - 'Formula/thriftc.rb'
      - 'action/install/action.yaml'

jobs:
  install:
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        version:
          - '0.8.0'
          - '0.9.0'
          - '0.9.1'
          - '0.9.2'
          - '0.9.3'
          - '0.9.3.1'
          - '0.10.0'
          - '0.11.0'
          - '0.12.0'
          - '0.13.0'
          - '0.14.2'
          - '0.15.0'

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: install binary
        uses: ./action/install
        with:
          formula: thriftc
          env: 'HOMEBREW_THRIFTC_VERSION=${{ matrix.version }}'

      - name: check binary
        run: ls -la /home/linuxbrew/.linuxbrew/opt/thriftc/bin/thrift
