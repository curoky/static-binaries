name: build xz
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-xz.yaml'
      - 'Formula/xz.rb'
      - 'action/install/action.yaml'

jobs:
  install:
    strategy:
      fail-fast: false
      matrix:
        version:
          - '5.2.5'
          - '5.0.8'

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: install binary
        uses: ./action/install
        with:
          formula: xz
          env: 'HOMEBREW_XZ_VERSION=${{ matrix.version }}'

      - name: check binary
        run: ls -lah bin

      - name: upload artifacts
        uses: actions/upload-artifact@v2
        with:
          name: binaries-${{ matrix.version }}
          path: bin
          retention-days: 1

  upload-release:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/download-artifact@v2
        with:
          name: binaries-5.2.5
          path: bin/5.2.5

      - uses: actions/download-artifact@v2
        with:
          name: binaries-5.0.8
          path: bin/5.0.8

      - name: list files
        run: ls -lahR bin

      - name: prepare files
        run: |
          mkdir dist
          mv bin/5.2.5/xz dist/xz-5.2.5
          mv bin/5.0.8/xz dist/xz-5.0.8

      - name: upload binaries to release
        # if: github.event_name == 'release' && github.event.action == 'created'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/*
          overwrite: true
          file_glob: true
          tag: ${{ github.ref }}
          prerelease: true

      - uses: mxschmitt/action-tmate@v3
        if: always()
        timeout-minutes: 30
