name: build mold
on:
  workflow_dispatch:
  # push:
  #   paths:
  #     - '.github/workflows/build-mold.yaml'
  #     - 'Formula/mold.rb'
  #     - 'action/install/action.yaml'
  # release:
  #   types: [created]

jobs:
  install:
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.1.1'

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: install binary
        uses: ./action/install
        with:
          formula: mold
          env: 'HOMEBREW_MOLD_VERSION=${{ matrix.version }}'

      - name: check binary
        run: |
          ls -lah bin
          mkdir -p dist/bin
          mv bin dist/bin/${{ matrix.version }}

      - name: upload artifacts
        uses: actions/upload-artifact@v2
        with:
          name: binaries-${{ matrix.version }}
          path: dist
          retention-days: 1

  upload-release:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v2
      - run: pip3 install typer
      - uses: actions/download-artifact@v2
        with:
          name: binaries-1.0.1

      - name: list files
        run: ls -lahR bin

      - name: prepare files
        run: ./pack.py bin dist mold

      - name: upload binaries to release
        if: github.event_name == 'release' && github.event.action == 'created'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/*
          overwrite: true
          file_glob: true
          tag: ${{ github.ref }}
          prerelease: true
