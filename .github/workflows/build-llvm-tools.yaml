name: build llvm tools
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-llvm-tools.yaml'
      - 'Formula/llvm-tools.rb'
      - 'action/install/action.yaml'
  release:
    types: [created]

jobs:
  install:
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        version:
          - '3.9.1'
          - '4.0.1'
          - '5.0.2'
          - '6.0.1'
          - '7.1.0'
          - '8.0.1'
          - '9.0.1'
          - '10.0.1'
          - '11.0.0'
          - '12.0.1'

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      # FIXME(curoky): remove follow trick
      - name: remove libtinfo
        run: |
          brew install ncurses && brew unlink ncurses
          sudo rm -rf /usr/lib/x86_64-linux-gnu/libtinfo.so /usr/lib/x86_64-linux-gnu/libz3.so

      - name: install binary
        uses: ./action/install
        with:
          formula: llvm-tools
          env: 'HOMEBREW_LLVMTOOLS_VERSION=${{ matrix.version }}'

      - name: check binary
        run: ls -lah bin

      - name: upload artifacts
        uses: actions/upload-artifact@v2
        with:
          name: binaries-${{ matrix.version }}
          path: bin
          retention-days: 1

  upload-release:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v2
      - run: pip3 install typer
      - uses: actions/download-artifact@v2
        with:
          name: binaries-3.9.1
          path: bin/3.9.1
      - uses: actions/download-artifact@v2
        with:
          name: binaries-4.0.1
          path: bin/4.0.1

      - uses: actions/download-artifact@v2
        with:
          name: binaries-5.0.2
          path: bin/5.0.2

      - uses: actions/download-artifact@v2
        with:
          name: binaries-6.0.1
          path: bin/6.0.1

      - uses: actions/download-artifact@v2
        with:
          name: binaries-7.1.0
          path: bin/7.1.0

      - uses: actions/download-artifact@v2
        with:
          name: binaries-8.0.1
          path: bin/8.0.1

      - uses: actions/download-artifact@v2
        with:
          name: binaries-9.0.1
          path: bin/9.0.1

      - uses: actions/download-artifact@v2
        with:
          name: binaries-10.0.1
          path: bin/10.0.1

      - uses: actions/download-artifact@v2
        with:
          name: binaries-11.0.0
          path: bin/11.0.0

      - uses: actions/download-artifact@v2
        with:
          name: binaries-12.0.1
          path: bin/12.0.1

      - name: list files
        run: ls -lahR bin

      - name: prepare files
        run: ./pack.py bin dist clang-format clang-query clang-tidy

      - name: upload binaries to release
        if: github.event_name == 'release' && github.event.action == 'created'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/*
          overwrite: true
          file_glob: true
          tag: ${{ github.ref }}
          prerelease: true
