name: build protoc
on:
  push:
    paths:
      - 'Formula/protoc@*'
      - '.github/workflows/build-protoc.yaml'

jobs:
  install:
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        os: [ubuntu20.04]
        version:
          - '3.1'
          - '3.2'
          - '3.3'
          - '3.4'
          - '3.5'
          - '3.7'
          - '3.8'
          - '3.9'
          - '3.13'
          - '3.14'
          - '3.15.6'

    runs-on: ubuntu-latest

    container:
      image: homebrew/${{ matrix.os }}

    env:
      HOMEBREW_NO_ANALYTICS: 1
      HOMEBREW_NO_AUTO_UPDATE: 1

    steps:
      - uses: actions/checkout@v2

      - name: Install and test
        uses: curoky/actions/brew-tap-install-test@master
        with:
          formula: protoc@${{ matrix.version }}

      - name: Upload package to Bintray
        uses: curoky/actions/bintary-upload@dev
        with:
          package: protoc
          remote_filepath: ${{ matrix.version }}/protoc
          local_filepath: /home/linuxbrew/.linuxbrew/opt/protoc@${{ matrix.version }}/bin/protoc

          api_user: ${{ secrets.BINTRAY_USERNAME }}
          api_key: ${{ secrets.BINTRAY_API_KEY }}
          repository_user: curoky
          repository: prebuild-binary
          version: ${{ matrix.version }}
          publish: 1
          override: 1
