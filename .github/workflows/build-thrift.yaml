name: build thrift
on:
  push:
    paths:
      - 'Formula/thrift@*'
      - '.github/workflows/build-thrift.yaml'

jobs:
  install:
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        os: [ubuntu20.04]
        version:
          - '0.8.0'
          - '0.9.0'
          - '0.9.1'
          - '0.9.2'
          - '0.9.3.0'
          - '0.9.3.1'
          - '0.10.0'
          - '0.11.0'
          - '0.12.0'
          - '0.13.0'
          - '0.14.1'

    runs-on: ubuntu-latest

    container:
      image: homebrew/${{ matrix.os }}

    env:
      HOMEBREW_NO_ANALYTICS: 1
      HOMEBREW_NO_AUTO_UPDATE: 1

    steps:
      - uses: actions/checkout@v2

      - name: Install and test
        uses: curoky/actions/brew-tap-install-test@master
        with:
          formula: thrift@${{ matrix.version }}

      - name: Upload package to Bintray
        uses: curoky/actions/bintary-upload@dev
        with:
          package: thrift
          remote_filepath: ${{ matrix.version }}/thrift
          local_filepath: /home/linuxbrew/.linuxbrew/opt/thrift@${{ matrix.version }}/bin/thrift

          api_user: ${{ secrets.BINTRAY_USERNAME }}
          api_key: ${{ secrets.BINTRAY_API_KEY }}
          repository_user: curoky
          repository: prebuild-binary
          version: ${{ matrix.version }}
          publish: 1
          override: 1
