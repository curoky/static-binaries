name: build darwin

on:
  push:
    paths:
      - '.github/workflows/build-darwin.yaml'
      - 'packages/**'
      - 'manifests/**'
      - 'lib/**'
      - 'scripts/**'
      - 'flake*'
  workflow_dispatch:
    inputs:
      name:
        description: 'package name (use "*" to force build all)'
        default: ''
        required: false
        type: string
  schedule:
    - cron: '0 0 * * 0'

env:
  CACHIX_NAME: curoky-static-binaries-v2
  CACHIX_STORE: https://curoky-static-binaries-v2.cachix.org
  # Cross-platform packages that are exposed on darwin but fail to build there;
  # excluded so discover never selects them. Linux-only packages are already
  # absent from `.#packages.aarch64-darwin` (filtered by their manifest
  # `platforms` / the localPackages.linux split), so they don't need listing.
  # Space-separated.
  EXCLUDE_PKGS: >-
    inetutils gnupg music-decrypto

jobs:
  discover:
    runs-on: macos-26
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      count: ${{ steps.set.outputs.count }}
    steps:
      - uses: Homebrew/actions/setup-homebrew@main

      # GNU grep provides `grep -P` (PCRE) and GNU findutils provides
      # `xargs -d`; BSD versions on macOS lack these.
      - run: echo "/opt/homebrew/opt/grep/libexec/gnubin" >> $GITHUB_PATH
      - run: echo "/opt/homebrew/opt/findutils/libexec/gnubin" >> $GITHUB_PATH
      - run: brew install grep findutils

      - uses: actions/checkout@v5

      - uses: DeterminateSystems/nix-installer-action@main

      - id: set
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_NAME: ${{ inputs.name }}
        run: |
          set -euo pipefail

          # Resolve every package's output path in a single evaluation, producing
          # TSV lines "<name>\t<outPath>" (excluding the "all" / "all-fast"
          # aggregates). Doing this in one `nix eval` avoids one process per
          # package and sidesteps attribute-path escaping issues for names
          # containing dots.
          nix eval --accept-flake-config --raw .#packages.aarch64-darwin --apply '
            pkgs: builtins.concatStringsSep "\n" (
              builtins.filter (s: s != "") (builtins.attrValues (builtins.mapAttrs
                (name: drv:
                  if name == "all" || name == "all-fast" then "" else "${name}\t${drv.outPath}")
                pkgs))
            )
          ' > pkgs.tsv

          # Packages that fail to build on darwin are excluded via EXCLUDE_PKGS
          # (configured at the top-level env).
          for name in $EXCLUDE_PKGS; do
            grep -vP "^${name}\t" pkgs.tsv > pkgs.tsv.tmp && mv pkgs.tsv.tmp pkgs.tsv
          done

          # Decide which packages to consider.
          # - workflow_dispatch with a specific name  -> only that package
          # - workflow_dispatch with "*", or schedule  -> force build all
          # - push                                     -> only packages missing from the binary cache
          force_all=false
          if [ "$EVENT_NAME" = "schedule" ]; then
            force_all=true
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$INPUT_NAME" = "*" ] || [ -z "$INPUT_NAME" ]; then
              force_all=true
            elif [ -n "$INPUT_NAME" ]; then
              # Keep only the requested package.
              grep -P "^${INPUT_NAME}\t" pkgs.tsv > pkgs.tsv.tmp && mv pkgs.tsv.tmp pkgs.tsv
            fi
          fi

          if [ "$force_all" = true ]; then
            cut -f1 pkgs.tsv > selected.txt
          else
            # Query the binary cache in parallel; a cache miss means the package
            # must be rebuilt. Print the name only for misses.
            check() {
              local name="${1%%$'\t'*}"
              local out_path="${1#*$'\t'}"
              if nix path-info --accept-flake-config --store "$CACHIX_STORE" "$out_path" >/dev/null 2>&1; then
                echo "cache hit : $name" >&2
              else
                echo "need build: $name" >&2
                echo "$name"
              fi
            }
            export -f check
            export CACHIX_STORE
            xargs -P 16 -d '\n' -I {} bash -c 'check "$@"' _ {} < pkgs.tsv > selected.txt
          fi

          # Build a matrix JSON: {"include":[{"name":"foo"},...]}
          matrix=$(nix run nixpkgs#jq -- -R -s -c \
            'split("\n") | map(select(length > 0)) | {include: map({name: .})}' < selected.txt)
          count=$(grep -c . selected.txt || true)

          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "selected packages ($count):"
          cat selected.txt

  build:
    needs: discover
    if: ${{ needs.discover.outputs.count != '0' }}
    runs-on: macos-26
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: Homebrew/actions/setup-homebrew@main

      - run: echo "/opt/homebrew/opt/binutils/bin" >> $GITHUB_PATH
      - run: echo "/opt/homebrew/opt/coreutils/libexec/gnubin" >> $GITHUB_PATH
      - run: echo "/opt/homebrew/opt/gnu-sed/libexec/gnubin" >> $GITHUB_PATH
      - run: brew install binutils gnu-sed coreutils rsync

      - uses: actions/checkout@v5

      - uses: DeterminateSystems/nix-installer-action@main

      - run: nix config show substituters

      - uses: cachix/cachix-action@v15
        with:
          name: ${{ env.CACHIX_NAME }}
          authToken: ${{ secrets.CACHIX_TOKEN }}

      - run: |
          nix build .#${{ matrix.name }}
          nix-store -qR $(readlink -f ./result)
          nix-store -qR $(readlink -f ./result) | cachix push ${{ env.CACHIX_NAME }}
          rsync -av --copy-unsafe-links ./result/ ./${{ matrix.name }}/
          find ./${{ matrix.name }} -type d -exec chmod +w {} +
          tar -czvf ./${{ matrix.name }}.darwin-arm64.tar.gz ./${{ matrix.name }}

      - uses: oras-project/setup-oras@v1

      - run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin

      - run: >
          oras push ghcr.io/curoky/standalone-binaries:${{ matrix.name }}-darwin-arm64
          ./${{ matrix.name }}.darwin-arm64.tar.gz:application/vnd.oci.image.layer.v1.tar+gzip
